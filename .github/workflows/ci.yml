name: CI - Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Go Build
        run: go build ./...

      - name: Go Vet
        run: go vet ./...

      - name: Go Test
        run: go test ./pkg/... ./internal/... -count=1 -race -coverprofile=coverage.out

      - name: Go Coverage Summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Frontend Install
        run: npm ci
        working-directory: web

      - name: Frontend Security Audit
        run: npm audit --audit-level=high || true
        working-directory: web

      - name: Frontend Type Check
        run: npx tsc --noEmit
        working-directory: web

      - name: Frontend Test
        run: npx vitest run
        working-directory: web

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zcid
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zcid
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install and start MinIO
        run: |
          wget -q https://dl.min.io/server/minio/release/linux-amd64/minio
          chmod +x minio
          MINIO_ROOT_USER=minioadmin MINIO_ROOT_PASSWORD=minioadmin ./minio server /tmp/minio-data &
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done

      - name: Run database migrations
        env:
          DB_URL: postgres://zcid:password@localhost:5432/zcid?sslmode=disable
        run: go run cmd/migrate/main.go up

      - name: Start backend server
        env:
          ZCID_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
        run: |
          go run cmd/server/main.go &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/v1/auth/login \
              -X POST -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin123"}' && break
            sleep 2
          done

      - name: Run integration tests
        env:
          ZCID_API_URL: http://localhost:8080
          ZCID_ADMIN_USERNAME: admin
          ZCID_ADMIN_PASSWORD: admin123
        run: go test ./tests/integration/... -v -count=1 -tags=integration -timeout=300s

      - name: Run migration integration test
        env:
          MIGRATION_TEST_DB_URL: postgres://zcid:password@localhost:5432/zcid?sslmode=disable
        run: go test ./pkg/database/... -v -count=1 -run Integration

  build-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
