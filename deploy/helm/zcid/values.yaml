# zcid Helm Chart Values

replicaCount: 1

image:
  repository: ghcr.io/jiayi-1994/zcid
  tag: "main"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: zcid.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# zcid application config
config:
  # Server
  serverPort: "8080"
  ginMode: "release"

  # Database (connect to middleware PostgreSQL)
  dbHost: "zcicd-pg-postgresql"
  dbPort: "5432"
  dbName: "zcicd"
  dbUser: "postgres"
  dbSSLMode: "disable"

  # Redis
  redisHost: "zcicd-redis-master"
  redisPort: "6379"
  redisDB: "0"

  # MinIO
  minioEndpoint: "zcicd-minio:9000"
  minioBucket: "zcid-logs"
  minioUseSSL: "false"

  # JWT
  jwtAccessExpiry: "15m"
  jwtRefreshExpiry: "7d"

  # Encryption key (AES-256, 32 bytes hex)
  # IMPORTANT: Change this in production!
  encryptionKey: "0123456789abcdef0123456789abcdef"

secrets:
  # Database password
  dbPassword: "zcicd123"
  # Redis password
  redisPassword: "zcicd123"
  # MinIO credentials
  minioAccessKey: "minioadmin"
  minioSecretKey: "zcicd123"
  # JWT signing key
  jwtSecret: "zcid-jwt-secret-2026"

# Pod configuration
nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Liveness & Readiness probes
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
