apiVersion: batch/v1
kind: Job
metadata:
  name: pull-tekton-k8s1
  namespace: kube-system
spec:
  template:
    spec:
      hostPID: true
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: k8s-1
      tolerations:
      - operator: Exists
      containers:
      - name: puller
        image: docker.io/library/alpine:3.21
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
        - |
          nsenter -t 1 -m -u -i -n -p -- bash -c '
          echo "=== Pulling Tekton images on k8s-1 ==="
          ctr -n k8s.io images pull gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/controller:v0.62.0 2>&1 && echo "OK controller" || echo "FAILED controller"
          ctr -n k8s.io images pull gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/webhook:v0.62.0 2>&1 && echo "OK webhook" || echo "FAILED webhook"
          ctr -n k8s.io images pull gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/events:v0.62.0 2>&1 && echo "OK events" || echo "FAILED events"
          ctr -n k8s.io images pull gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/resolvers:v0.62.0 2>&1 && echo "OK resolvers" || echo "FAILED resolvers"
          echo "=== DONE ==="
          '
      restartPolicy: Never
  backoffLimit: 0
---
