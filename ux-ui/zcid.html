<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>zcid · CI/CD Platform — Design System</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent-h: 220;
    --accent-1: oklch(0.62 0.20 var(--accent-h));
    --accent-2: oklch(0.55 0.22 calc(var(--accent-h) + 20));
    --accent-ink: oklch(0.42 0.17 var(--accent-h));
    --accent-soft: oklch(0.96 0.03 var(--accent-h));
    --accent-soft-border: oklch(0.90 0.05 var(--accent-h));
    /* zinc scale (neutral, very slightly cool) */
    --z-0: #ffffff;
    --z-25: #fafafa;
    --z-50: #f7f7f8;
    --z-100: #f2f2f3;
    --z-150: #eaeaec;
    --z-200: #e3e3e6;
    --z-300: #d3d3d7;
    --z-400: #a2a2a9;
    --z-500: #71717a;
    --z-600: #52525b;
    --z-700: #3f3f46;
    --z-800: #27272a;
    --z-900: #18181b;
    --z-950: #0b0b0d;

    --green: #16a34a;
    --green-soft: #dcfce7;
    --green-ink: #166534;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --red-ink: #991b1b;
    --amber: #ea580c;
    --amber-soft: #ffedd5;
    --amber-ink: #9a3412;
    --blue: #2563eb;
    --blue-soft: #dbeafe;
    --blue-ink: #1e40af;
    --cyan: #0891b2;
    --cyan-soft: #cffafe;
    --cyan-ink: #155e75;

    --radius-sm: 6px;
    --radius: 8px;
    --radius-md: 10px;
    --radius-lg: 12px;

    --shadow-xs: 0 1px 0 rgba(0,0,0,.04);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04), 0 1px 0 rgba(0,0,0,.02);
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
    --shadow-md: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    color: var(--z-900);
    background: var(--z-0);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Artboard host: everything inside a zcid screen inherits these defaults */
  .zc {
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.45;
    color: var(--z-900);
    background: var(--z-0);
    height: 100%;
    width: 100%;
    display: flex;
    overflow: hidden;
  }
  .zc, .zc * { box-sizing: border-box; }
  .zc ::selection { background: var(--accent-soft); color: var(--accent-ink); }
  .zc .mono { font-family: var(--font-mono); font-size: 12px; font-variant-ligatures: none; }
  .zc button { font-family: inherit; }

  /* ─── Scrollbar ─── */
  .zc ::-webkit-scrollbar { width: 10px; height: 10px; }
  .zc ::-webkit-scrollbar-track { background: transparent; }
  .zc ::-webkit-scrollbar-thumb { background: var(--z-200); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  .zc ::-webkit-scrollbar-thumb:hover { background: var(--z-300); border: 2px solid transparent; background-clip: padding-box; }

  /* ─── Typography ─── */
  .zc h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin: 0; color: var(--z-900); }
  .zc h2 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; margin: 0; color: var(--z-900); }
  .zc h3 { font-size: 13px; font-weight: 600; margin: 0; color: var(--z-900); }
  .zc p { margin: 0; color: var(--z-600); }
  .zc .crumb { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--z-500); }
  .zc .sub { font-size: 12px; color: var(--z-500); }
  .zc .kbd { font-family: var(--font-mono); font-size: 10.5px; padding: 1px 5px; border-radius: 4px; background: var(--z-100); border: 1px solid var(--z-200); color: var(--z-600); }

  /* ─── Button ─── */
  .zc .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 30px; padding: 0 12px;
    font-size: 12.5px; font-weight: 500;
    border-radius: var(--radius);
    border: 1px solid transparent;
    background: var(--z-0);
    color: var(--z-900);
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s, box-shadow .12s;
    white-space: nowrap;
    user-select: none;
  }
  .zc .btn--outline { border-color: var(--z-200); }
  .zc .btn--outline:hover { background: var(--z-50); border-color: var(--z-300); }
  .zc .btn--ghost { color: var(--z-600); }
  .zc .btn--ghost:hover { background: var(--z-100); color: var(--z-900); }
  .zc .btn--primary {
    background: linear-gradient(180deg, var(--accent-1), var(--accent-2));
    color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,.2) inset, 0 1px 2px rgba(0,0,0,.12), 0 0 0 1px color-mix(in oklch, var(--accent-2), black 8%);
  }
  .zc .btn--primary:hover { filter: brightness(1.05); }
  .zc .btn--danger { color: var(--red); border: 1px solid var(--z-200); }
  .zc .btn--danger:hover { background: var(--red-soft); border-color: color-mix(in oklch, var(--red), white 60%); }
  .zc .btn--sm { height: 26px; padding: 0 9px; font-size: 12px; border-radius: 6px; }
  .zc .btn--xs { height: 22px; padding: 0 7px; font-size: 11.5px; border-radius: 5px; }
  .zc .btn--icon { width: 26px; padding: 0; justify-content: center; }
  .zc .btn--icon.btn--sm { width: 26px; }
  .zc .btn svg { flex: none; }

  /* ─── Input ─── */
  .zc .input {
    height: 30px;
    padding: 0 10px;
    border: 1px solid var(--z-200);
    border-radius: var(--radius);
    background: var(--z-0);
    color: var(--z-900);
    font-size: 12.5px;
    font-family: inherit;
    outline: none;
    transition: border-color .12s, box-shadow .12s;
    width: 100%;
  }
  .zc .input::placeholder { color: var(--z-400); }
  .zc .input:focus { border-color: var(--accent-1); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent-1), white 85%); }
  .zc .input--with-icon { padding-left: 28px; }
  .zc .input-wrap { position: relative; }
  .zc .input-wrap > svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--z-400); pointer-events: none; }

  /* ─── Badge / pill ─── */
  .zc .badge {
    display: inline-flex; align-items: center; gap: 5px;
    height: 20px; padding: 0 7px;
    font-size: 11px; font-weight: 500;
    border-radius: 999px;
    background: var(--z-100);
    color: var(--z-700);
    border: 1px solid var(--z-150);
    white-space: nowrap;
  }
  .zc .badge .dot { width: 6px; height: 6px; border-radius: 3px; background: currentColor; }
  .zc .badge--green { background: var(--green-soft); color: var(--green-ink); border-color: color-mix(in oklch, var(--green), white 70%); }
  .zc .badge--red   { background: var(--red-soft);   color: var(--red-ink);   border-color: color-mix(in oklch, var(--red),   white 70%); }
  .zc .badge--amber { background: var(--amber-soft); color: var(--amber-ink); border-color: color-mix(in oklch, var(--amber), white 70%); }
  .zc .badge--blue  { background: var(--blue-soft);  color: var(--blue-ink);  border-color: color-mix(in oklch, var(--blue),  white 70%); }
  .zc .badge--cyan  { background: var(--cyan-soft);  color: var(--cyan-ink);  border-color: color-mix(in oklch, var(--cyan),  white 70%); }
  .zc .badge--accent { background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent-soft-border); }
  .zc .badge--grey  { background: var(--z-100); color: var(--z-600); border-color: var(--z-200); }

  /* ─── Card ─── */
  .zc .card {
    background: var(--z-0);
    border: 1px solid var(--z-200);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-xs);
  }
  .zc .card-hd { padding: 14px 16px; border-bottom: 1px solid var(--z-150); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .zc .card-bd { padding: 14px 16px; }

  /* ─── Table ─── */
  .zc .table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12.5px; }
  .zc .table th {
    text-align: left; font-weight: 500; color: var(--z-500);
    padding: 9px 12px; font-size: 11px; letter-spacing: 0.02em;
    background: var(--z-25);
    border-bottom: 1px solid var(--z-150);
    white-space: nowrap;
    text-transform: uppercase;
  }
  .zc .table td {
    padding: 10px 12px; border-bottom: 1px solid var(--z-100);
    color: var(--z-800);
    vertical-align: middle;
  }
  .zc .table tr:last-child td { border-bottom: 0; }
  .zc .table tr:hover td { background: var(--z-25); }

  /* ─── Avatar ─── */
  .zc .avatar {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff; font-weight: 600; font-size: 11px; letter-spacing: 0.02em;
    flex: none;
  }
  .zc .avatar--round { border-radius: 50%; }
  .zc .avatar--sm { width: 22px; height: 22px; font-size: 10px; border-radius: 5px; }
  .zc .avatar--lg { width: 40px; height: 40px; font-size: 14px; border-radius: 10px; }

  /* ─── Switch ─── */
  .zc .sw { position: relative; width: 28px; height: 16px; border-radius: 999px; background: var(--z-200); cursor: pointer; transition: background .14s; border: 0; padding: 0; }
  .zc .sw i { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2); transition: transform .14s; }
  .zc .sw[data-on="1"] { background: var(--accent-1); }
  .zc .sw[data-on="1"] i { transform: translateX(12px); }

  /* ─── Code block ─── */
  .zc .code {
    font-family: var(--font-mono); font-size: 11.5px;
    background: var(--z-50); border: 1px solid var(--z-150);
    padding: 2px 6px; border-radius: 5px;
    color: var(--z-700);
  }
  .zc .codeblock {
    font-family: var(--font-mono); font-size: 12px;
    background: #0b0b0d; color: #e4e4e7;
    border-radius: 8px; padding: 14px; overflow: auto;
  }

  /* ─── Page header ─── */
  .zc .page-hd {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--z-150);
  }
  .zc .page-hd .meta .crumb { margin-bottom: 6px; display: block; }
  .zc .page-hd h1 { margin-bottom: 4px; }
  .zc .page-hd .sub { max-width: 640px; }
  .zc .page-hd .actions { display: flex; gap: 8px; flex: none; }

  /* ─── Sidebar ─── */
  .zc .nav {
    width: 232px; flex: none; height: 100%;
    background: var(--z-25);
    border-right: 1px solid var(--z-150);
    display: flex; flex-direction: column;
  }
  .zc .nav-hd { padding: 14px 16px 10px; display: flex; align-items: center; gap: 9px; }
  .zc .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff; display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; letter-spacing: -0.02em;
    box-shadow: 0 2px 6px color-mix(in oklch, var(--accent-1), transparent 70%), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .zc .nav-group { padding: 8px 8px; display: flex; flex-direction: column; gap: 1px; }
  .zc .nav-group + .nav-group { margin-top: 6px; }
  .zc .nav-title {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--z-500); padding: 6px 10px 4px;
  }
  .zc .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 10px; border-radius: 6px;
    font-size: 12.5px; color: var(--z-700);
    cursor: pointer; position: relative;
    text-decoration: none;
  }
  .zc .nav-item:hover { background: var(--z-100); color: var(--z-900); }
  .zc .nav-item.is-active {
    background: var(--accent-soft);
    color: var(--accent-ink);
    font-weight: 500;
  }
  .zc .nav-item.is-active::before {
    content: ''; position: absolute; left: -8px; top: 4px; bottom: 4px;
    width: 2px; border-radius: 1px; background: var(--accent-1);
  }
  .zc .nav-item svg { flex: none; color: currentColor; opacity: .8; }
  .zc .nav-ft {
    margin-top: auto; padding: 8px; border-top: 1px solid var(--z-150);
  }
  .zc .nav-user {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 9px; border-radius: 8px; cursor: pointer;
  }
  .zc .nav-user:hover { background: var(--z-100); }
  .zc .nav-user .who { flex: 1; min-width: 0; }
  .zc .nav-user .who b { display: block; font-size: 12.5px; font-weight: 500; color: var(--z-900); }
  .zc .nav-user .who small { font-size: 10.5px; color: var(--z-500); }

  /* ─── Topbar (above content) ─── */
  .zc .top {
    height: 40px; flex: none;
    border-bottom: 1px solid var(--z-150);
    display: flex; align-items: center; gap: 10px;
    padding: 0 18px;
    background: var(--z-0);
  }
  .zc .top .crumb-path {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--z-500);
  }
  .zc .top .crumb-path b { color: var(--z-900); font-weight: 500; }

  /* ─── Project sub-nav ─── */
  .zc .subnav {
    width: 220px; flex: none; height: 100%;
    background: var(--z-0); border-right: 1px solid var(--z-150);
    display: flex; flex-direction: column;
  }
  .zc .subnav-hd { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--z-150); }
  .zc .subnav-hd .avatar { border-radius: 7px; }

  /* ─── Content area ─── */
  .zc .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; background: var(--z-0); }
  .zc .scroll { flex: 1; overflow: auto; }

  /* ─── Metric card ─── */
  .zc .metric {
    background: var(--z-0);
    border: 1px solid var(--z-200);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .zc .metric .mx { display: flex; align-items: center; justify-content: space-between; }
  .zc .metric .ico {
    width: 28px; height: 28px; border-radius: 7px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--z-100); color: var(--z-600);
  }
  .zc .metric .mlabel { font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--z-500); }
  .zc .metric .mval { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: var(--z-900); font-variant-numeric: tabular-nums; }
  .zc .metric .mtrend { font-size: 11.5px; color: var(--z-500); }
  .zc .metric.is-active { border-color: var(--accent-1); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent-1), white 85%); }
  .zc .metric.is-clickable { cursor: pointer; transition: border-color .12s; }
  .zc .metric.is-clickable:hover { border-color: var(--z-300); }

  /* ─── Status dot ─── */
  .zc .st-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; flex: none;
  }
  .zc .st-dot--green  { background: var(--green); box-shadow: 0 0 0 3px color-mix(in oklch, var(--green), white 80%); }
  .zc .st-dot--red    { background: var(--red);   box-shadow: 0 0 0 3px color-mix(in oklch, var(--red),   white 80%); }
  .zc .st-dot--amber  { background: var(--amber); box-shadow: 0 0 0 3px color-mix(in oklch, var(--amber), white 80%); }
  .zc .st-dot--blue   { background: var(--blue);  box-shadow: 0 0 0 3px color-mix(in oklch, var(--blue),  white 80%); }
  .zc .st-dot--cyan   { background: var(--cyan);  box-shadow: 0 0 0 3px color-mix(in oklch, var(--cyan),  white 80%); }
  .zc .st-dot--grey   { background: var(--z-400); box-shadow: 0 0 0 3px var(--z-100); }
  .zc .st-dot.is-pulse { animation: stpulse 1.6s ease-in-out infinite; }
  @keyframes stpulse {
    0%, 100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    50%      { box-shadow: 0 0 0 4px transparent; opacity: .7; }
  }

  /* ─── Misc ─── */
  .zc .row { display: flex; align-items: center; }
  .zc .gap-4 { gap: 4px; } .zc .gap-6 { gap: 6px; } .zc .gap-8 { gap: 8px; } .zc .gap-10 { gap: 10px; } .zc .gap-12 { gap: 12px; } .zc .gap-16 { gap: 16px; }
  .zc .grow { flex: 1; min-width: 0; }
  .zc .divider { height: 1px; background: var(--z-150); margin: 14px 0; }
  .zc .hstack { display: flex; align-items: center; }
  .zc .vstack { display: flex; flex-direction: column; }
  .zc .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px;
    background: var(--z-50); border: 1px solid var(--z-150);
    color: var(--z-700);
  }

  /* ─── Modal ─── */
  .zc .modal-bg {
    position: absolute; inset: 0;
    background: rgba(15, 15, 20, 0.35);
    backdrop-filter: blur(2px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
  }
  .zc .modal {
    width: 440px; max-width: 90%;
    background: var(--z-0); border-radius: 12px;
    border: 1px solid var(--z-200);
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    overflow: hidden;
  }
  .zc .modal-hd { padding: 16px 18px; border-bottom: 1px solid var(--z-150); display:flex; align-items:center; justify-content:space-between; }
  .zc .modal-bd { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
  .zc .modal-ft { padding: 12px 18px; border-top: 1px solid var(--z-150); display: flex; justify-content: flex-end; gap: 8px; background: var(--z-25); }
  .zc .field-label { font-size: 11.5px; font-weight: 500; color: var(--z-700); margin-bottom: 5px; display: flex; align-items: center; gap: 4px; }
  .zc .field-label .req { color: var(--red); }
  .zc .help { font-size: 11px; color: var(--z-500); margin-top: 4px; }

  /* Gradient Z block (for login etc) */
  .zc .zmark {
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    box-shadow: 0 16px 40px -10px color-mix(in oklch, var(--accent-1), transparent 55%), inset 0 1px 0 rgba(255,255,255,.3);
  }

  /* segmented */
  .zc .seg { display: inline-flex; padding: 2px; background: var(--z-100); border-radius: 7px; border: 1px solid var(--z-150); }
  .zc .seg button { height: 24px; padding: 0 10px; border: 0; background: transparent; font-size: 12px; color: var(--z-600); border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .zc .seg button.is-on { background: var(--z-0); color: var(--z-900); box-shadow: 0 1px 2px rgba(0,0,0,.06); }

  /* Text pill tag */
  .zc .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 999px;
    font-size: 11px; background: var(--z-100); color: var(--z-700);
    border: 1px solid var(--z-150);
    font-family: var(--font-mono);
  }

  /* List row (generic) */
  .zc .lrow {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 8px;
    border: 1px solid transparent; cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .zc .lrow:hover { background: var(--z-25); border-color: var(--z-150); }

  /* stripe bg */
  .zc .stripe {
    background-image: repeating-linear-gradient(135deg, var(--z-50), var(--z-50) 6px, var(--z-25) 6px, var(--z-25) 12px);
    color: var(--z-400);
  }

  /* progress line */
  .zc .pbar { height: 4px; background: var(--z-100); border-radius: 2px; overflow: hidden; }
  .zc .pbar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); border-radius: 2px; }

  /* Focus ring */
  .zc :focus-visible { outline: none; }

  /* Tailwind-ish flex helpers (scoped) */
